name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Tests and smoke checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync environment
        run: uv sync --dev --locked

      - name: Run tests
        run: uv run pytest -q

      - name: Run verification smoke
        run: scripts/verify.sh

      - name: Run package smoke
        run: scripts/package-smoke.sh
