name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  github-release:
    name: Build and publish GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync environment
        run: uv sync --dev --locked

      - name: Validate release metadata
        run: scripts/release-check.sh --tag "$GITHUB_REF_NAME"

      - name: Run tests
        run: uv run pytest -q

      - name: Run verification smoke
        run: scripts/verify.sh

      - name: Run package smoke
        run: scripts/package-smoke.sh

      - name: Build distributions
        run: uv build --wheel --sdist --out-dir dist

      - name: Extract release notes
        run: python scripts/release_tools.py notes --version "${GITHUB_REF_NAME#v}" --output release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --notes-file release-notes.md --verify-tag
